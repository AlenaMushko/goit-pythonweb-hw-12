services:
  postgres:
    image: postgres:16-alpine
    restart: always
    container_name: ${POSTGRES_CONTAINER_NAME:-hw_10-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hw10}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    container_name: ${REDIS_CONTAINER_NAME:-hw_10-redis}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change_me_redis_password}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis_password}

  app:
    build: .
    container_name: ${APP_CONTAINER_NAME:-hw_10-app-container}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5001:8003"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8003
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      SECRET_KEY: ${SECRET_KEY:-change_me}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Contacts API}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-True}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS:-False}
      USE_CREDENTIALS: ${USE_CREDENTIALS:-True}
      VERIFY_EMAIL_HOST: ${VERIFY_EMAIL_HOST:-http://localhost:8003}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      TOKEN_CLEANUP_INTERVAL_SECONDS: ${TOKEN_CLEANUP_INTERVAL_SECONDS:-604800}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change_me_redis_password}
      REDIS_USER_CACHE_TTL_SECONDS: ${REDIS_USER_CACHE_TTL_SECONDS:-3600}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-hw10}
    volumes:
      - .:/hw_10-app-container

volumes:
  postgres_data:
  redis_data: